<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #1a4d3e;
            --light-green: #2d7a6e;
            --cream: #faf7f2;
            --dark-text: #2a2a2a;
            --accent-gold: #c9a961;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'ヒラギノ角ゴ Pro', sans-serif;
            background: var(--cream);
            color: var(--dark-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 320px;
        }

        /* ===== TIMER ===== */
        .timer-section {
            text-align: center;
            margin-bottom: 4rem;
        }

        .time-display {
            font-size: 5.5rem;
            font-weight: 300;
            font-family: 'Courier New', monospace;
            letter-spacing: 12px;
            color: var(--primary-green);
            line-height: 1;
            margin-bottom: 1.5rem;
            font-variant-numeric: tabular-nums;
            transition: opacity 0.3s ease;
        }

        .time-display.break {
            color: var(--light-green);
        }

        .status-label {
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #999;
            font-weight: 600;
        }

        /* ===== CONTROLS ===== */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            border: none;
            background: var(--primary-green);
            color: var(--cream);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            border-radius: 8px;
        }

        button:hover {
            background: var(--light-green);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: transparent;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
        }

        button.secondary:hover {
            background: var(--primary-green);
            color: var(--cream);
        }

        /* ===== MINIMAL SETTINGS ===== */
        .settings {
            background: white;
            border-radius: 0;
            padding: 0;
            margin-bottom: 3rem;
            border-top: 1px solid #e8e8e8;
            border-bottom: 1px solid #e8e8e8;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #e8e8e8;
        }

        .setting-row:last-child {
            border-bottom: none;
        }

        .setting-label {
            font-size: 0.85rem;
            color: var(--dark-text);
            font-weight: 500;
        }

        .setting-value {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .minute-input {
            width: 40px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-green);
            border: none;
            background: transparent;
            font-family: 'Courier New', monospace;
        }

        .minute-btn {
            width: 24px;
            height: 24px;
            padding: 0;
            background: transparent;
            border: 1px solid #ccc;
            color: var(--primary-green);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .minute-btn:hover {
            border-color: var(--primary-green);
            background: #f5f5f5;
        }

        .toggle-switch {
            width: 40px;
            height: 24px;
            background: #ddd;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s ease;
            border: none;
        }

        .toggle-switch.active {
            background: var(--accent-gold);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s ease;
        }

        .toggle-switch.active::after {
            left: 18px;
        }

        /* ===== STATS ===== */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            text-align: center;
        }

        .stat-box {
            padding: 1rem;
            background: white;
            border-radius: 8px;
            border: 1px solid #e8e8e8;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 300;
            color: var(--primary-green);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #999;
            font-weight: 600;
        }

        /* ===== ANIMATION ===== */
        @keyframes pulse-subtle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .time-display.active {
            animation: pulse-subtle 2s ease-in-out infinite;
        }

        .notification {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-green);
            color: var(--cream);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            font-size: 0.85rem;
            animation: slideUp 0.4s ease-out;
            z-index: 1000;
        }

        @keyframes slideUp {
            from {
                transform: translateX(-50%) translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .time-display {
                font-size: 4rem;
                letter-spacing: 8px;
            }

            .container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- TIMER DISPLAY -->
        <div class="timer-section">
            <div class="time-display" id="timeDisplay">25:00</div>
            <div class="status-label" id="statusLabel">集中時間</div>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <button id="startBtn" onclick="toggleTimer()">開始</button>
            <button class="secondary" onclick="resetTimer()">リセット</button>
        </div>

        <!-- SETTINGS -->
        <div class="settings">
            <div class="setting-row">
                <span class="setting-label">集中時間</span>
                <div class="setting-value">
                    <button class="minute-btn" onclick="changeWorkDuration(-1)">−</button>
                    <input type="text" class="minute-input" id="workDuration" value="25" readonly>
                    <span style="font-size: 0.8rem; color: #999;">分</span>
                    <button class="minute-btn" onclick="changeWorkDuration(1)">+</button>
                </div>
            </div>

            <div class="setting-row">
                <span class="setting-label">休憩時間</span>
                <div class="setting-value">
                    <button class="minute-btn" onclick="changeBreakDuration(-1)">−</button>
                    <input type="text" class="minute-input" id="breakDuration" value="5" readonly>
                    <span style="font-size: 0.8rem; color: #999;">分</span>
                    <button class="minute-btn" onclick="changeBreakDuration(1)">+</button>
                </div>
            </div>

            <div class="setting-row">
                <span class="setting-label">サウンド</span>
                <button class="toggle-switch" id="soundToggle" onclick="toggleSound()" style="justify-self: end;"></button>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="sessionsCount">0</div>
                <div class="stat-label">セッション</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="minutesCount">0</div>
                <div class="stat-label">分</div>
            </div>
        </div>
    </div>

    <script>
        // State
        let isRunning = false;
        let isWorkSession = true;
        let timeLeft = 25 * 60;
        let workDuration = 25;
        let breakDuration = 5;
        let sessionsCompleted = 0;
        let totalMinutesWorked = 0;
        let soundEnabled = true;
        let timerInterval = null;

        const timeDisplay = document.getElementById('timeDisplay');
        const statusLabel = document.getElementById('statusLabel');
        const startBtn = document.getElementById('startBtn');
        const soundToggle = document.getElementById('soundToggle');

        // Initialize
        function init() {
            soundToggle.classList.add('active');
            loadStats();
            updateDisplay();
        }

        // Toggle timer
        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                startBtn.textContent = '再開';
                timeDisplay.classList.remove('active');
                isRunning = false;
            } else {
                startBtn.textContent = '一時停止';
                timeDisplay.classList.add('active');
                isRunning = true;
                timerInterval = setInterval(tick, 1000);
            }
        }

        // Tick
        function tick() {
            timeLeft--;
            updateDisplay();

            if (timeLeft === 0) {
                completeSession();
            }
        }

        // Complete session
        function completeSession() {
            clearInterval(timerInterval);
            isRunning = false;
            timeDisplay.classList.remove('active');

            if (isWorkSession) {
                totalMinutesWorked += workDuration;
                sessionsCompleted++;
                playSound();
                showNotification(`${workDuration}分の集中が完了しました`);
                isWorkSession = false;
                timeLeft = breakDuration * 60;
            } else {
                playSound();
                showNotification('休憩時間が終わりました');
                isWorkSession = true;
                timeLeft = workDuration * 60;
            }

            updateDisplay();
            startBtn.textContent = '開始';
            saveStats();
        }

        // Reset
        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            isWorkSession = true;
            timeLeft = workDuration * 60;
            timeDisplay.classList.remove('active');
            updateDisplay();
            startBtn.textContent = '開始';
        }

        // Change durations
        function changeWorkDuration(delta) {
            workDuration = Math.max(1, Math.min(60, workDuration + delta));
            document.getElementById('workDuration').value = workDuration;
            if (!isRunning) {
                timeLeft = workDuration * 60;
                updateDisplay();
            }
        }

        function changeBreakDuration(delta) {
            breakDuration = Math.max(1, Math.min(30, breakDuration + delta));
            document.getElementById('breakDuration').value = breakDuration;
        }

        // Toggle sound
        function toggleSound() {
            soundEnabled = !soundEnabled;
            soundToggle.classList.toggle('active');
        }

        // Update display
        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timeDisplay.textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            if (isWorkSession) {
                statusLabel.textContent = '集中時間';
                timeDisplay.classList.remove('break');
            } else {
                statusLabel.textContent = '休憩時間';
                timeDisplay.classList.add('break');
            }

            document.getElementById('sessionsCount').textContent = sessionsCompleted;
            document.getElementById('minutesCount').textContent = totalMinutesWorked;
        }

        // Play sound
        function playSound() {
            if (!soundEnabled) return;
            
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();

                osc.connect(gain);
                gain.connect(audioContext.destination);

                osc.frequency.value = 800;
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + 0.5);
            } catch (e) {
                console.log('Audio not available');
            }
        }

        // Show notification
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Save/Load stats
        function saveStats() {
            const today = new Date().toDateString();
            localStorage.setItem(`pomodoro_${today}`, JSON.stringify({
                sessions: sessionsCompleted,
                minutes: totalMinutesWorked
            }));
        }

        function loadStats() {
            const today = new Date().toDateString();
            const stats = localStorage.getItem(`pomodoro_${today}`);
            if (stats) {
                const data = JSON.parse(stats);
                sessionsCompleted = data.sessions;
                totalMinutesWorked = data.minutes;
            }
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
